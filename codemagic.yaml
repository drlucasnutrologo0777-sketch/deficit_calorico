workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: Confirmar API Apple
        script: |
          set -e
          echo "OK: workflow iOS assinado (sem ios_signing pre-upload)"
          test -n "$APP_STORE_CONNECT_KEY_IDENTIFIER"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          app-store-connect apps list --limit 3
      - name: Registrar Bundle ID na Apple
        script: |
          set -e
          keychain initialize
          if ! app-store-connect bundle-ids list | grep -q "$BUNDLE_ID"; then
            app-store-connect bundle-ids create "$BUNDLE_ID" \
              --name "Deficit Calorico" \
              --enable-sign-in-with-apple
          else
            echo "Bundle ID ja existe: $BUNDLE_ID"
          fi
      - name: Certificado Distribution
        script: |
          set -e
          app-store-connect certificates list --type IOS_DISTRIBUTION --save \
            || app-store-connect certificates create --type IOS_DISTRIBUTION --save
      - name: Perfil App Store (criar e baixar)
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles
          keychain add-certificates
          echo "Perfis baixados:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
      - name: Aplicar assinatura no Xcode
        script: |
          set -e
          xcode-project use-profiles
      - name: Dependencias
        script: |
          set -e
          flutter pub get
          cd ios && pod install --repo-update
      - name: Gerar IPA
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
