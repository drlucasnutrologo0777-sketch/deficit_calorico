workflows:
  deficit-calorico-ios:
    name: Deficit Calorico iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      groups:
        - ios_signing
    scripts:
      - name: Criar perfil e certificado Apple
        script: |
          app-store-connect fetch-signing-files com.mycompany.deficitcalorico \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Aplicar assinatura no Xcode
        script: xcode-project use-profiles
      - name: Dependencias
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Build IPA release
        script: |
          flutter build ipa --release \
            --build-name=1.0.2 \
            --build-number=116
    artifacts:
      - build/ios/ipa/*.ipa
