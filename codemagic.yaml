workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      # Dart 3.9+: font_awesome 11 + google_fonts 6.3.3 + page_transition 2.2.2
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: "Assinatura v5 (auto-retry 409)"
        script: |
          set -e
          echo "=== BUILD v5 ==="
          keychain initialize
          openssl genpkey -algorithm RSA -out /tmp/cm_dist.key -pkeyopt rsa_keygen_bits:2048

          delete_all() {
            app-store-connect certificates list --type IOS_DISTRIBUTION --json > /tmp/c.json 2>/dev/null || echo "[]" > /tmp/c.json
            python3 << 'PY'
          import json, subprocess
          with open("/tmp/c.json") as f:
              raw = json.load(f)
          items = raw if isinstance(raw, list) else (raw.get("data") or [])
          for item in items:
              subprocess.run(["app-store-connect","certificates","delete",item["id"],"--ignore-not-found"], check=False)
          PY
            app-store-connect certificates list --type DISTRIBUTION --json > /tmp/c2.json 2>/dev/null || echo "[]" > /tmp/c2.json
            python3 << 'PY'
          import json, subprocess
          with open("/tmp/c2.json") as f:
              raw = json.load(f)
          items = raw if isinstance(raw, list) else (raw.get("data") or [])
          for item in items:
              subprocess.run(["app-store-connect","certificates","delete",item["id"],"--ignore-not-found"], check=False)
          PY
          }

          OK=0
          T=1
          while [ "$T" -le 10 ]; do
            echo "Tentativa $T/10..."
            delete_all
            sleep 90
            if app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --create \
              --delete-stale-profiles \
              --strict-match-identifier \
              --certificate-key @file:/tmp/cm_dist.key 2>/tmp/sign.log; then
              OK=1
              break
            fi
            cat /tmp/sign.log
            T=$((T+1))
          done

          if [ "$OK" -ne 1 ]; then
            echo "FALHOU apos 10 tentativas. Espere 1 hora sem clicar Create certificate e rode build de novo."
            exit 1
          fi

          keychain add-certificates
          xcode-project use-profiles
          echo "OK v5"
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get
      - name: CocoaPods
        script: |
          set -e
          cd ios
          pod install --repo-update
      - name: Build IPA
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          test -n "$BUILD_NAME" && test -n "$BUILD_NUMBER"
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
