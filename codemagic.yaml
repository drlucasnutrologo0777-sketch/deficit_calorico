workflows:
  deficit-calorico-ios:
    name: Deficit Calorico iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: Criar certificado e perfil App Store
        script: |
          set -e
          keychain initialize
          app-store-connect certificates list --type IOS_DISTRIBUTION --save || \
          app-store-connect certificates create --type IOS_DISTRIBUTION --save
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Aplicar assinatura no Xcode
        script: xcode-project use-profiles
      - name: Dependencias
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Build IPA release
        script: |
          flutter build ipa --release \
            --build-name=1.0.2 \
            --build-number=116
    artifacts:
      - build/ios/ipa/*.ipa
