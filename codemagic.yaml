workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: Testar chave Apple
        script: |
          set -e
          KEY_ID="$(echo "$APP_STORE_CONNECT_KEY_IDENTIFIER" | tr -d '[:space:]')"
          echo "Key ID: [$KEY_ID]"
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERRO: Issuer ID vazio. Recadastre DeficitApple no Codemagic."
            exit 1
          fi
          echo "Testando API Apple..."
          app-store-connect apps list
          echo "OK: chave Apple autenticou."
      - name: Keychain
        script: keychain initialize
      - name: Certificado Distribution (chave privada NOVA)
        script: |
          set -e
          openssl genpkey -algorithm RSA -out /tmp/cm_dist.key -pkeyopt rsa_keygen_bits:2048
          app-store-connect certificates create --type IOS_DISTRIBUTION --save \
            --certificate-key @file:/tmp/cm_dist.key
      - name: Perfil App Store
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier
      - name: Instalar certificados
        script: keychain add-certificates
      - name: Aplicar perfil no Xcode
        script: xcode-project use-profiles
      - name: Dependencias Flutter
        script: |
          set -e
          flutter pub get
          cd ios && pod install --repo-update
      - name: Gerar IPA
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
