workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        APP_STORE_APPLE_ID: "6772267019"
    scripts:
      - name: Criar Bundle ID e perfil App Store
        script: |
          set -e
          keychain initialize

          echo "=== Bundle ID $BUNDLE_ID ==="
          app-store-connect bundle-ids list --json > /tmp/bundle_ids.json || echo "[]" > /tmp/bundle_ids.json
          if ! grep -q "$BUNDLE_ID" /tmp/bundle_ids.json; then
            echo "Criando Bundle ID..."
            app-store-connect bundle-ids create \
              --identifier "$BUNDLE_ID" \
              --name "Deficit Calorico" \
              --platform IOS
          else
            echo "Bundle ID ja existe."
          fi

          echo "=== Sign in with Apple ==="
          app-store-connect bundle-ids enable-capability \
            --bundle-id-identifier "$BUNDLE_ID" \
            --capability-type SIGN_IN_WITH_APPLE 2>/dev/null || true

          echo "=== Certificado + perfil App Store ==="
          KEY_FILE=/tmp/cm_dist.key
          if [ -n "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > "$KEY_FILE"
            echo "Usando CERTIFICATE_PRIVATE_KEY do Codemagic."
          else
            openssl genpkey -algorithm RSA -out "$KEY_FILE" -pkeyopt rsa_keygen_bits:2048
            echo "Chave nova gerada neste build."
          fi

          revoke_distribution_certs() {
            echo "=== Revogar certs Distribution (limite Apple / 409) ==="
            app-store-connect certificates list \
              --type DISTRIBUTION \
              --type IOS_DISTRIBUTION \
              --json -s > /tmp/certs.json 2>/tmp/certs_err.txt || true
            cat /tmp/certs.json
            python3 << 'PY'
          import json, subprocess, sys
          from pathlib import Path

          def run(cmd):
              return subprocess.run(cmd, capture_output=True, text=True)

          raw = Path("/tmp/certs.json").read_text(encoding="utf-8", errors="replace").strip()
          if not raw:
              err = Path("/tmp/certs_err.txt").read_text(encoding="utf-8", errors="replace")
              print("Lista vazia.", err[:500], flush=True)
              sys.exit(1)
          idx = min(i for i in (raw.find("["), raw.find("{")) if i >= 0)
          data = json.loads(raw[idx:])
          items = data if isinstance(data, list) else data.get("data", [])
          deleted = 0
          for item in items:
              cid = item.get("id")
              ctype = (item.get("attributes") or {}).get("certificateType", "")
              if not cid or ctype not in ("DISTRIBUTION", "IOS_DISTRIBUTION"):
                  continue
              print(f"DELETE {ctype} {cid}", flush=True)
              r = run(["app-store-connect", "certificates", "delete", cid, "-s"])
              if r.returncode == 0:
                  deleted += 1
              else:
                  print(r.stderr or r.stdout, flush=True)
          print(f"Revogados: {deleted}", flush=True)
          if deleted == 0:
              print("ERRO: API nao revogou. Apague manualmente:", flush=True)
              print("https://developer.apple.com/account/resources/certificates/list", flush=True)
              sys.exit(1)
          PY
          }

          fetch_create() {
            app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --delete-stale-profiles \
              --certificate-key "@file:$KEY_FILE" \
              --create
          }

          set +e
          fetch_create
          FETCH_RC=$?
          set -e

          if [ "$FETCH_RC" -ne 0 ]; then
            revoke_distribution_certs
            echo "Aguardando 45s (Apple processar)..."
            sleep 45
            fetch_create
          fi

          keychain add-certificates

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          COUNT=$(find "$PROFILE_DIR" -name "*.mobileprovision" 2>/dev/null | wc -l | tr -d ' ')
          echo "Perfis em disco: $COUNT"
          if [ "$COUNT" = "0" ]; then
            echo "ERRO: sem perfil .mobileprovision"
            exit 1
          fi
          echo "Assinatura OK."
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get
      - name: Icones do app
        script: |
          dart run flutter_launcher_icons
      - name: CocoaPods
        script: |
          set -e
          cd ios && pod install --repo-update
      - name: Aplicar perfil e gerar IPA
        script: |
          set -e
          keychain initialize
          keychain add-certificates

          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging

          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"

          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"

          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          test -n "$IPA"
          echo "IPA: $IPA"
      - name: ENVIAR para Apple
        script: |
          set -e
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          app-store-connect publish \
            --path "$IPA" \
            --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
          echo "Upload OK."
    artifacts:
      - build/ios/ipa/*.ipa
