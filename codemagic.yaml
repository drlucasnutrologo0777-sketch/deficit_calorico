workflows:
  default-workflow:
    name: Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Xcode signing
        script: xcode-project use-profiles
      - name: Dependencies
        script: |
          flutter pub get
          cd ios && pod install
      - name: IPA App Store
        script: |
          echo "BUILD=flutter build ipa --release (NOT no-codesign)"
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Android AAB
        script: |
          flutter pub get
          flutter build appbundle --release
    artifacts:
      - build/ios/ipa/*.ipa
      - build/app/outputs/bundle/release/*.aab
