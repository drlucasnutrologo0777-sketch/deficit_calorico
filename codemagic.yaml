workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
    scripts:
      - name: Confirmar chave Apple
        script: |
          set -e
          echo "OK: codemagic.yaml rodando"
          if [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] || [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERRO: Cadastre integracao DeficitApple (Team settings → Developer Portal)"
            exit 1
          fi
          app-store-connect apps list --limit 3
      - name: Criar certificado Distribution
        script: |
          set -e
          keychain initialize
          app-store-connect certificates list --type IOS_DISTRIBUTION --save \
            || app-store-connect certificates create --type IOS_DISTRIBUTION --save
      - name: Criar perfil App Store
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles
          keychain add-certificates
      - name: Aplicar perfil no Xcode
        script: xcode-project use-profiles
      - name: Dependencias
        script: |
          set -e
          flutter pub get
          cd ios && pod install --repo-update
      - name: Gerar IPA
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
