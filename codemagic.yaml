workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        # Tem que bater com o .p8 cadastrado em DeficitApple:
        EXPECTED_KEY_ID: 8NWZ4B392L
    scripts:
      - name: Testar chave Apple (401 = chave errada no Codemagic)
        script: |
          set -e
          echo "Key no build: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Esperado: $EXPECTED_KEY_ID"
          if [ "$APP_STORE_CONNECT_KEY_IDENTIFIER" != "$EXPECTED_KEY_ID" ]; then
            echo "ERRO: Key ID no Codemagic NAO e 8NWZ4B392L."
            echo "Team settings > Integrations > DeficitApple > apague e cadastre de novo:"
            echo "  Key ID: 8NWZ4B392L"
            echo "  Arquivo: AuthKey_8NWZ4B392L.p8"
            echo "  Issuer ID: copiar do topo da pagina API da Apple"
            exit 1
          fi
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERRO: Issuer ID vazio. Recadastre DeficitApple."
            exit 1
          fi
          echo "Testando API Apple..."
          app-store-connect apps list --limit 1
          echo "OK: chave Apple autenticou."
      - name: Keychain
        script: keychain initialize
      - name: Certificado Distribution (chave privada NOVA)
        script: |
          set -e
          openssl genpkey -algorithm RSA -out /tmp/cm_dist.key -pkeyopt rsa_keygen_bits:2048
          app-store-connect certificates create --type IOS_DISTRIBUTION --save \
            --certificate-key @file:/tmp/cm_dist.key
      - name: Perfil App Store
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier
      - name: Instalar certificados
        script: keychain add-certificates
      - name: Aplicar perfil no Xcode
        script: xcode-project use-profiles
      - name: Dependencias Flutter
        script: |
          set -e
          flutter pub get
          cd ios && pod install --repo-update
      - name: Gerar IPA
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
