workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        APP_STORE_APPLE_ID: "6772267019"
    scripts:
      - name: Assinatura App Store (distribuicao)
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier
          keychain add-certificates
          xcode-project use-profiles
          echo "Perfis de distribuicao instalados."
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get
      - name: Icones do app
        script: |
          dart run flutter_launcher_icons
      - name: CocoaPods
        script: |
          set -e
          cd ios && pod install --repo-update
      - name: Build IPA assinado para App Store
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          test -n "$IPA"
          echo "Verificando assinatura do IPA..."
          unzip -q "$IPA" -d /tmp/ipa_check
          codesign -dv --verbose=4 /tmp/ipa_check/Payload/*.app 2>&1 | tee /tmp/codesign.log
          if grep -qi "iPhone Developer" /tmp/codesign.log && ! grep -qi "Distribution" /tmp/codesign.log; then
            echo "ERRO: IPA parece assinado com certificado de DESENVOLVIMENTO."
            exit 1
          fi
          echo "IPA OK: $IPA"
      - name: ENVIAR para Apple (upload IPA)
        script: |
          set -e
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          echo "Enviando: $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
          echo "Upload concluido. Use build novo no App Store Connect (nao o 117)."
    artifacts:
      - build/ios/ipa/*.ipa
