# iOS App Store — automatico (voce so clica Start new build no Codemagic)
workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        APP_STORE_APPLE_ID: "6772267019"
    scripts:
      - name: iOS assinatura automatica
        script: |
          set -e
          echo "=== iOS signing BUILD_SIGNING_V7 (sem grupos no yaml) ==="

          keychain initialize

          app-store-connect bundle-ids create \
            --identifier "$BUNDLE_ID" \
            --name "Deficit Calorico" \
            --platform IOS 2>/dev/null || true
          app-store-connect bundle-ids enable-capability \
            --bundle-id-identifier "$BUNDLE_ID" \
            --capability-type SIGN_IN_WITH_APPLE 2>/dev/null || true

          KEY_FILE=/tmp/cm_dist.key
          USE_KEY=0
          if [ -n "${CERTIFICATE_PRIVATE_KEY:-}" ] && printf '%s' "$CERTIFICATE_PRIVATE_KEY" | grep -q 'BEGIN.*PRIVATE KEY'; then
            printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > "$KEY_FILE"
            chmod 600 "$KEY_FILE"
            USE_KEY=1
            echo "Usando CERTIFICATE_PRIVATE_KEY (variavel do app, sem grupo)."
          else
            echo "Sem CERTIFICATE_PRIVATE_KEY — assinatura so pela integracao DeficitApple."
          fi

          echo "--- Certificados Distribution na conta Apple ---"
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION --type DISTRIBUTION || true

          REVOKED=0
          revoke_certs() {
            app-store-connect certificates list \
              --type DISTRIBUTION --type IOS_DISTRIBUTION \
              --json > /tmp/certs.json 2>/tmp/certs.list.err || true
            REVOKED=$(python3 << 'PY'
          import json, subprocess, sys
          from pathlib import Path
          raw = Path("/tmp/certs.json").read_text(encoding="utf-8", errors="replace").strip()
          if not raw:
              print("0", flush=True)
              sys.exit(0)
          i = min(x for x in (raw.find("["), raw.find("{")) if x >= 0)
          data = json.loads(raw[i:])
          items = data if isinstance(data, list) else data.get("data", [])
          n = 0
          for item in items:
              cid = item.get("id")
              t = (item.get("attributes") or {}).get("certificateType", "")
              if cid and t in ("DISTRIBUTION", "IOS_DISTRIBUTION"):
                  print(f"DELETE {t} {cid}", file=sys.stderr, flush=True)
                  r = subprocess.run(
                      ["app-store-connect", "certificates", "delete", cid],
                      capture_output=True,
                      text=True,
                  )
                  if r.returncode == 0:
                      n += 1
                  else:
                      err = (r.stderr or r.stdout or "").strip()
                      print(f"  FALHA delete {cid}: {err}", file=sys.stderr, flush=True)
          print(n, flush=True)
          PY
          )
            echo "Revogados: $REVOKED"
          }

          sign_app_store() {
            if [ "$USE_KEY" = "1" ]; then
              app-store-connect fetch-signing-files "$BUNDLE_ID" \
                --type IOS_APP_STORE \
                --delete-stale-profiles \
                --certificate-key "@file:$KEY_FILE" \
                --create
            else
              app-store-connect fetch-signing-files "$BUNDLE_ID" \
                --type IOS_APP_STORE \
                --delete-stale-profiles \
                --create
            fi
          }

          fail_manual() {
            echo ""
            echo "=========================================="
            echo " PARE - NAO RODE OUTRO BUILD AINDA"
            echo "=========================================="
            echo "Causa: 2 certificados na Apple + chave do Codemagic nao combina."
            echo "API nao apagou (Revogados: 0) = apague VOCE na Apple:"
            echo "  https://developer.apple.com/account/resources/certificates/list"
            echo "Apague TODOS Apple Distribution / iOS Distribution."
            echo "Espere 30 minutos."
            echo "Opcional: Environment variables > CERTIFICATE_PRIVATE_KEY (Secure, sem grupo)."
            echo "Integracao DeficitApple = Admin ou App Manager (obrigatorio)."
            echo "Depois: Start new build (workflow iOS App Store)."
            exit 1
          }

          set +e
          sign_app_store
          RC=$?
          set -e
          if [ "$RC" -ne 0 ]; then
            echo "Assinatura falhou (RC=$RC). Tentando revogar certificados pela API..."
            revoke_certs
            if [ "${REVOKED:-0}" = "0" ]; then
              fail_manual
            fi
            echo "Aguardando 45s para Apple processar revogacao..."
            sleep 45
            sign_app_store || fail_manual
          fi

          keychain add-certificates
          test "$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name '*.mobileprovision' 2>/dev/null | wc -l | tr -d ' ')" != "0"
          echo "Assinatura OK."
      - name: Flutter pub get
        script: flutter pub get
      - name: Icones do app
        script: dart run flutter_launcher_icons
      - name: CocoaPods
        script: cd ios && pod install --repo-update
      - name: Build IPA App Store
        script: |
          set -e
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist" \
            --archive-method app-store
          BN=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          BV=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          flutter build ipa --release --build-name="$BV" --build-number="$BN" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"
          test -n "$(find build/ios/ipa -name '*.ipa' | head -1)"
      - name: ENVIAR para Apple
        script: |
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          app-store-connect publish --path "$IPA" --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
    artifacts:
      - build/ios/ipa/*.ipa
