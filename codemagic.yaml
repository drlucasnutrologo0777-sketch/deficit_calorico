workflows:
  deficit-calorico-ios:
    name: Deficit Calorico iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
    scripts:
      - name: Configurar assinatura iOS no Xcode
        script: xcode-project use-profiles
      - name: Instalar dependencias Flutter
        script: flutter pub get
      - name: Gerar IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.2 \
            --build-number=116
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
