workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: Assinatura Apple (certificado + perfil)
        script: |
          set -e
          keychain initialize
          openssl genpkey -algorithm RSA -out /tmp/cm_dist.key -pkeyopt rsa_keygen_bits:2048
          echo "Bundle: $BUNDLE_ID"

          run_signing() {
            app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --create \
              --delete-stale-profiles \
              --strict-match-identifier \
              --certificate-key @file:/tmp/cm_dist.key
          }

          if ! run_signing 2>/tmp/sign_err.log; then
            if grep -qE "409|already have a current Distribution" /tmp/sign_err.log; then
              echo "Apple: 3 certificados cheios. Apagando 1 Distribution antigo..."
              CERT_ID=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin).get('data') or []
          print(data[-1]['id'] if data else '')
          ")
              if [ -z "$CERT_ID" ]; then
                echo "ERRO: nao foi possivel apagar certificado automaticamente."
                echo "Abra: https://developer.apple.com/account/resources/certificates/list"
                echo "Revogue 1 certificado Apple Distribution e rode o build de novo."
                exit 1
              fi
              app-store-connect certificates delete "$CERT_ID"
              run_signing
            else
              cat /tmp/sign_err.log
              exit 1
            fi
          fi

          keychain add-certificates
          xcode-project use-profiles
          echo "OK: assinatura pronta"
      - name: Build IPA
        script: |
          set -e
          flutter pub get
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"
          (cd ios && pod install --repo-update)
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
