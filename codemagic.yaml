# UMA VEZ no Codemagic (antes do build):
# Team settings > codemagic.yaml settings > Code signing identities
#   iOS certificates > Generate certificate > Distribution > API key DeficitApple > Create
#   iOS provisioning profiles > Fetch profiles > App Store > com.mycompany.deficitcalorico
#
workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: Assinatura (usa certificado salvo no Codemagic)
        script: |
          set -e
          xcode-project use-profiles
          echo "OK: perfil aplicado"
      - name: Build IPA
        script: |
          set -e
          flutter pub get
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"
          (cd ios && pod install --repo-update)
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
