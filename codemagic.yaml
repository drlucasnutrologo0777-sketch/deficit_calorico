workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: "Assinatura v4"
        script: |
          set -e
          echo "=== BUILD v4 ==="
          keychain initialize
          openssl genpkey -algorithm RSA -out /tmp/cm_dist.key -pkeyopt rsa_keygen_bits:2048

          delete_all_dist_certs() {
            for ctype in IOS_DISTRIBUTION DISTRIBUTION; do
              app-store-connect certificates list --type "$ctype" --json > /tmp/c.json 2>/dev/null || echo "[]" > /tmp/c.json
              python3 << 'PY'
          import json, subprocess
          with open("/tmp/c.json") as f:
              raw = json.load(f)
          items = raw if isinstance(raw, list) else (raw.get("data") or [])
          for item in items:
              subprocess.run(
                  ["app-store-connect", "certificates", "delete", item["id"], "--ignore-not-found"],
                  check=False,
              )
          PY
            done
          }

          delete_all_dist_certs
          echo "Aguardando 60s (pedido pendente Apple)..."
          sleep 60
          delete_all_dist_certs

          echo "Criando certificado..."
          if ! app-store-connect certificates create --type IOS_DISTRIBUTION --save \
              --certificate-key @file:/tmp/cm_dist.key 2>/tmp/cerr.log; then
            cat /tmp/cerr.log
            echo "409/pending: rode LIMPAR-CERTIFICADOS-APPLE.bat no PC, espere 30 min, build de novo."
            exit 1
          fi

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --strict-match-identifier \
            --certificate-key @file:/tmp/cm_dist.key

          keychain add-certificates
          xcode-project use-profiles
          echo "OK v4"
      - name: Build IPA
        script: |
          set -e
          flutter pub get
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"
          (cd ios && pod install --repo-update)
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
