# USE ESTE WORKFLOW NO CODEMAGIC: "PUBLICAR IPHONE"
# NAO use "default", "Flutter iOS unsigned" nem Workflow Editor.
#
# Codemagic → Team settings → Integrations → Developer Portal
# A chave API deve existir (qualquer nome) — troque "DeficitApple" abaixo pelo nome EXATO da sua chave.
#
workflows:
  publicar-iphone:
    name: PUBLICAR IPHONE
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: Assinatura Xcode
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA assinado
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  publicar-android:
    name: PUBLICAR ANDROID
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Build AAB
        script: |
          flutter pub get
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
