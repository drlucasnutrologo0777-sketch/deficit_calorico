    scripts:
      - name: iOS assinatura automatica
        script: |
          set -e
          echo "=== iOS signing BUILD_SIGNING_STABLE_V1 ==="

          keychain initialize

          app-store-connect bundle-ids create \
            --identifier "$BUNDLE_ID" \
            --name "Deficit Calorico" \
            --platform IOS 2>/dev/null || true
          app-store-connect bundle-ids enable-capability \
            --bundle-id-identifier "$BUNDLE_ID" \
            --capability-type SIGN_IN_WITH_APPLE 2>/dev/null || true

          KEY_FILE=/tmp/cm_dist.key
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERRO: CERTIFICATE_PRIVATE_KEY nao configurada no Codemagic."
            echo "Sem chave fixa, entra no ciclo 409 de certificados."
            exit 1
          fi
          # Normaliza formatos comuns no Codemagic:
          # - multiline real
          # - string unica com '\n' literal
          # - com aspas acidentais nas pontas
          NORMALIZED_KEY="$(printf '%s' "$CERTIFICATE_PRIVATE_KEY" | sed 's/\\r$//')"
          NORMALIZED_KEY="${NORMALIZED_KEY#\"}"
          NORMALIZED_KEY="${NORMALIZED_KEY%\"}"
          if printf '%s' "$NORMALIZED_KEY" | grep -q '\\n'; then
            NORMALIZED_KEY="$(printf '%s' "$NORMALIZED_KEY" | sed 's/\\n/\n/g')"
          fi
          printf '%s\n' "$NORMALIZED_KEY" > "$KEY_FILE"
          if ! grep -Eq -- '-----BEGIN (RSA )?PRIVATE KEY-----' "$KEY_FILE"; then
            echo "ERRO: CERTIFICATE_PRIVATE_KEY invalida (PEM incompleto)."
            echo "Precisa comecar com -----BEGIN PRIVATE KEY----- e terminar com -----END PRIVATE KEY-----."
            exit 1
          fi
          echo "Chave fixa carregada do Codemagic."
          chmod 600 "$KEY_FILE"

          echo "Limpando certificados Distribution antigos (mesma conta da integracao)..."
          app-store-connect certificates list \
            --type DISTRIBUTION --type IOS_DISTRIBUTION \
            --json -s > /tmp/certs.json 2>/tmp/certs.err || true
          python3 <<'PY'
          import json, subprocess, sys
          from pathlib import Path
          raw = Path("/tmp/certs.json").read_text(encoding="utf-8", errors="replace").strip()
          if not raw:
              err = Path("/tmp/certs.err").read_text(encoding="utf-8", errors="replace").strip()
              if err:
                  print(f"DELETE LIST FAIL: {err}")
              print("Revogados: 0 (lista vazia)")
              raise SystemExit(0)
          i = min(x for x in (raw.find("["), raw.find("{")) if x >= 0)
          data = json.loads(raw[i:])
          items = data if isinstance(data, list) else data.get("data", [])
          print(f"Certificados listados: {len(items)}")
          n = 0
          for item in items:
              cid = item.get("id")
              ctype = (item.get("attributes") or {}).get("certificateType", "")
              if cid and ctype in ("DISTRIBUTION", "IOS_DISTRIBUTION"):
                  r = subprocess.run(["app-store-connect", "certificates", "delete", cid, "-s"], capture_output=True, text=True)
                  if r.returncode == 0:
                      n += 1
                      print(f"DELETE OK: {cid}")
                  else:
                      err = (r.stderr or r.stdout or "").strip()
                      print(f"DELETE FAIL: {cid} :: {err}")
          print(f"Revogados: {n}")
          if len(items) > 0 and n == 0:
              print("ERRO: API key sem permissao de apagar certificados ou team incorreto.")
              sys.exit(3)
          PY
          echo "Aguardando 30s para Apple processar revogacoes..."
          sleep 30

          echo "Criando certificado + perfil App Store com chave fixa..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --delete-stale-profiles \
            --certificate-key "@file:$KEY_FILE" \
            --create

          XCODE_PROFILES="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          MOBILE_PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$MOBILE_PROFILES"
          if [ -d "$XCODE_PROFILES" ]; then
            cp -f "$XCODE_PROFILES"/*.mobileprovision "$MOBILE_PROFILES"/ 2>/dev/null || true
          fi

          set +e
          keychain add-certificates
          set -e

          PROFILE_COUNT=$(find "$XCODE_PROFILES" "$MOBILE_PROFILES" -name '*.mobileprovision' 2>/dev/null | wc -l | tr -d ' ')
          echo "Perfis .mobileprovision encontrados: $PROFILE_COUNT"
          if [ "$PROFILE_COUNT" = "0" ]; then
            echo "ERRO: perfil nao encontrado apos fetch-signing-files."
            exit 1
          fi
          echo "Assinatura OK."
      - name: Flutter pub get
        script: flutter pub get
      - name: Icones do app
        script: dart run flutter_launcher_icons
      - name: CocoaPods
        script: cd ios && pod install --repo-update
      - name: Build IPA App Store
        script: |
          set -e
          keychain initialize
          if ! keychain add-certificates; then
            echo "Aviso: keychain add-certificates retornou erro no passo de build, continuando."
          fi
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist" \
            --archive-method app-store
          BN=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          BV=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          flutter build ipa --release --build-name="$BV" --build-number="$BN" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"
          test -n "$(find build/ios/ipa -name '*.ipa' | head -1)"
      - name: ENVIAR para Apple
        script: |
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          app-store-connect publish --path "$IPA" --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
    artifacts:
      - build/ios/ipa/*.ipa
