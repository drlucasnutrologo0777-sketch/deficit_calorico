workflows:
  deficit-calorico-ios:
    name: Deficit Calorico iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Deficit Calorico
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
    scripts:
      - name: Criar certificado e perfil Apple
        script: |
          app-store-connect fetch-signing-files com.mycompany.deficitcalorico \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Configurar assinatura iOS no Xcode
        script: xcode-project use-profiles
      - name: Dependencias Flutter e CocoaPods
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Build IPA release
        script: |
          flutter build ipa --release \
            --build-name=1.0.2 \
            --build-number=116
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
