# iOS App Store — assinatura CORRETA (sem gerar chave nova a cada build)
#
# OBRIGATORIO UMA VEZ: Area de Trabalho > CLIQUE-IOS-DEFICIT.bat
# Codemagic > Environment variables (sem grupo obrigatorio):
#   CERTIFICATE_PRIVATE_KEY = conteudo do arquivo .key (Secure)
#
workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        APP_STORE_APPLE_ID: "6772267019"
    scripts:
      - name: iOS assinatura App Store
        script: |
          set -e
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo ""
            echo "============================================================"
            echo " FALTA CONFIGURAR ASSINATURA iOS (uma vez no Codemagic)"
            echo "============================================================"
            echo "1) No PC: rode tools\\SETUP-IOS-DEFINITIVO.bat"
            echo "2) Codemagic > Environment variables"
            echo "   Nome:  CERTIFICATE_PRIVATE_KEY (pode ser sem grupo)"
            echo "   Valor: cole o arquivo deficit_ios_dist_private.key (Secure)"
            echo "3) Start new build de novo"
            echo "============================================================"
            exit 1
          fi

          keychain initialize
          KEY_FILE=/tmp/cm_dist.key
          printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > "$KEY_FILE"

          echo "=== Bundle ID ==="
          app-store-connect bundle-ids create \
            --identifier "$BUNDLE_ID" \
            --name "Deficit Calorico" \
            --platform IOS 2>/dev/null || true
          app-store-connect bundle-ids enable-capability \
            --bundle-id-identifier "$BUNDLE_ID" \
            --capability-type SIGN_IN_WITH_APPLE 2>/dev/null || true

          echo "=== Baixar ou criar certificado + perfil IOS_APP_STORE ==="
          set +e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --delete-stale-profiles \
            --certificate-key "@file:$KEY_FILE"
          FETCH_RC=$?
          set -e

          if [ "$FETCH_RC" -ne 0 ]; then
            echo "Criando certificado novo (primeira vez ou apos limpar na Apple)..."
            app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --delete-stale-profiles \
              --certificate-key "@file:$KEY_FILE" \
              --create || {
              echo ""
              echo "ERRO 409: Apple ja tem 2 certificados Distribution."
              echo "Apague TODOS em (uma vez no navegador):"
              echo "https://developer.apple.com/account/resources/certificates/list"
              echo "Espere 20 min e rode o build de novo."
              exit 1
            }
          fi

          keychain add-certificates
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          COUNT=$(find "$PROFILE_DIR" -name "*.mobileprovision" 2>/dev/null | wc -l | tr -d ' ')
          echo "Perfis: $COUNT"
          test "$COUNT" != "0"
          echo "Assinatura App Store OK."
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get
      - name: Icones do app
        script: |
          dart run flutter_launcher_icons
      - name: CocoaPods
        script: |
          set -e
          cd ios && pod install --repo-update
      - name: Build IPA App Store
        script: |
          set -e
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist" \
            --archive-method app-store

          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"

          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"

          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          test -n "$IPA"
          codesign -dvv "$IPA" 2>&1 | head -20
          echo "IPA: $IPA"
      - name: ENVIAR para Apple
        script: |
          set -e
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          app-store-connect publish \
            --path "$IPA" \
            --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
          echo "Upload OK."
    artifacts:
      - build/ios/ipa/*.ipa
