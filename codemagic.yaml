# OBRIGATORIO no Codemagic (uma vez):
# App deficit_calorico → Settings → Build → Configuration = "codemagic.yaml"
# (desligar Workflow Editor / Flutter default unsigned)
#
# Team settings → Integrations → Developer Portal → chave com nome EXATO: DeficitApple
# Arquivo: AuthKey_JKJWFZT3S8.p8 | Key ID: JKJWFZT3S8
#
workflows:
  # Substitui o build padrao que roda: flutter build ios --debug --no-codesign
  default-workflow:
    name: Build iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
    scripts:
      - name: Abortar se chave Apple ausente
        script: |
          set -e
          echo "=== WORKFLOW: default-workflow (IPA assinado) ==="
          if [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] || [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERRO: Integracao DeficitApple nao configurada no Codemagic."
            echo "Team settings → Integrations → Developer Portal → Add key → nome: DeficitApple"
            exit 1
          fi
      - name: Assinatura Xcode
        script: xcode-project use-profiles
      - name: Dependencias
        script: |
          set -e
          flutter pub get
          cd ios && pod install --repo-update
      - name: IPA App Store release
        script: |
          set -e
          echo "BUILD=flutter build ipa --release (NAO no-codesign)"
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  deficit-calorico-ios:
    name: Deficit Calorico iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
    scripts:
      - name: Abortar se chave Apple ausente
        script: |
          set -e
          echo "=== WORKFLOW: deficit-calorico-ios (IPA assinado) ==="
          if [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] || [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERRO: Integracao DeficitApple nao configurada."
            exit 1
          fi
      - name: Assinatura Xcode
        script: xcode-project use-profiles
      - name: Dependencias
        script: |
          set -e
          flutter pub get
          cd ios && pod install --repo-update
      - name: IPA App Store release
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa

  deficit-calorico-android:
    name: Deficit Calorico Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Team settings → codemagic.yaml → Android keystores → upload upload-keystore.jks
    # Reference name: deficit_upload | alias upload | senha DeficitCalorico2026!
    environment:
      flutter: stable
    scripts:
      - name: Build AAB
        script: |
          flutter pub get
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build appbundle --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER"
          AAB="build/app/outputs/bundle/release/app-release.aab"
          if [ -n "$CM_KEYSTORE_PATH" ] && [ -f "$AAB" ]; then
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore "$CM_KEYSTORE_PATH" -storepass "$CM_KEYSTORE_PASSWORD" \
              -keypass "$CM_KEY_PASSWORD" "$AAB" "$CM_KEY_ALIAS"
            jarsigner -verify "$AAB"
          fi
    artifacts:
      - build/app/outputs/bundle/release/*.aab
