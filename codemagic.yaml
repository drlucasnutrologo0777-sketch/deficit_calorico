workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        APP_STORE_APPLE_ID: "6772267019"
    scripts:
      - name: Criar Bundle ID e perfil App Store
        script: |
          set -e
          keychain initialize

          echo "=== Bundle IDs na conta ==="
          app-store-connect bundle-ids list --json > /tmp/bundle_ids.json || echo "[]" > /tmp/bundle_ids.json
          cat /tmp/bundle_ids.json | head -c 4000 || true

          if ! grep -q "$BUNDLE_ID" /tmp/bundle_ids.json; then
            echo "Criando Bundle ID $BUNDLE_ID ..."
            app-store-connect bundle-ids create \
              --identifier "$BUNDLE_ID" \
              --name "Deficit Calorico" \
              --platform IOS || true
          fi

          echo "=== Buscando/criando certificado + perfil IOS_APP_STORE ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles

          keychain add-certificates
          xcode-project use-profiles
          echo "Assinatura App Store configurada."
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get
      - name: Icones do app
        script: |
          dart run flutter_launcher_icons
      - name: CocoaPods
        script: |
          set -e
          cd ios && pod install --repo-update
      - name: Build IPA App Store
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          test -n "$IPA"
          echo "IPA: $IPA"
      - name: ENVIAR para Apple
        script: |
          set -e
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          app-store-connect publish \
            --path "$IPA" \
            --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
          echo "Upload OK. Build $BUILD_NUMBER no App Store Connect."
    artifacts:
      - build/ios/ipa/*.ipa
