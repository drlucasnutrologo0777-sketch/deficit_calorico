workflows:
  deficit-calorico-ios:
    name: Deficit Calorico iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      groups:
        - ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
    scripts:
      - name: Aplicar assinatura no Xcode
        script: xcode-project use-profiles
      - name: Dependencias
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Build IPA release
        script: |
          flutter build ipa --release \
            --build-name=1.0.2 \
            --build-number=116
    artifacts:
      - build/ios/ipa/*.ipa
