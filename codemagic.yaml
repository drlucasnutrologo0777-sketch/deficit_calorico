# iOS App Store — automatico (voce so clica Start new build no Codemagic)
workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        APP_STORE_APPLE_ID: "6772267019"
    scripts:
      - name: iOS assinatura automatica
        script: |
          set -e
          echo "=== iOS signing BUILD_SIGNING_V9 (sem colar chave) ==="

          keychain initialize

          app-store-connect bundle-ids create \
            --identifier "$BUNDLE_ID" \
            --name "Deficit Calorico" \
            --platform IOS 2>/dev/null || true
          app-store-connect bundle-ids enable-capability \
            --bundle-id-identifier "$BUNDLE_ID" \
            --capability-type SIGN_IN_WITH_APPLE 2>/dev/null || true

          KEY_FILE=/tmp/cm_dist.key
          if [ -n "${CERTIFICATE_PRIVATE_KEY:-}" ] && printf '%s' "$CERTIFICATE_PRIVATE_KEY" | grep -q 'BEGIN.*PRIVATE KEY'; then
            printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > "$KEY_FILE"
            echo "Chave: Codemagic (CERTIFICATE_PRIVATE_KEY)."
          else
            echo "Chave: gerada automaticamente — voce nao precisa fazer nada."
            openssl genpkey -algorithm RSA -out "$KEY_FILE" -pkeyopt rsa_keygen_bits:2048
            cp "$KEY_FILE" "$CM_BUILD_DIR/deficit_ios_dist_private.key"
          fi
          chmod 600 "$KEY_FILE"

          echo "--- Certificados Distribution na Apple ---"
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION --type DISTRIBUTION || true

          echo "Criando/baixando certificado + perfil App Store..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --delete-stale-profiles \
            --certificate-key "@file:$KEY_FILE" \
            --create

          keychain add-certificates
          test "$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name '*.mobileprovision' 2>/dev/null | wc -l | tr -d ' ')" != "0"
          echo "Assinatura OK."
      - name: Flutter pub get
        script: flutter pub get
      - name: Icones do app
        script: dart run flutter_launcher_icons
      - name: CocoaPods
        script: cd ios && pod install --repo-update
      - name: Build IPA App Store
        script: |
          set -e
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist" \
            --archive-method app-store
          BN=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          BV=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          flutter build ipa --release --build-name="$BV" --build-number="$BN" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"
          test -n "$(find build/ios/ipa -name '*.ipa' | head -1)"
      - name: ENVIAR para Apple
        script: |
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          app-store-connect publish --path "$IPA" --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
    artifacts:
      - build/ios/ipa/*.ipa
      - deficit_ios_dist_private.key
