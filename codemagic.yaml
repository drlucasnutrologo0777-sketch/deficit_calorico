# SE O LOG MOSTRAR "no-codesign" O CODEMAGIC NAO ESTA LENDO ESTE ARQUIVO.
# App Settings → Build → Configuration = codemagic.yaml → Save
#
workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.deficitcalorico
    scripts:
      - name: "0 - CONFIRMA YAML (se nao ver isto, build errado)"
        script: |
          set -e
          echo "=============================================="
          echo "OK: codemagic.yaml ESTA RODANDO"
          echo "WORKFLOW: default-workflow"
          echo "PROXIMO: flutter build ipa --release"
          echo "=============================================="
          if [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] || [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERRO: No Codemagic, cadastre a chave Apple com nome: DeficitApple"
            exit 1
          fi
      - name: Assinatura Apple no Xcode
        script: xcode-project use-profiles
      - name: Dependencias
        script: |
          set -e
          flutter pub get
          cd ios && pod install --repo-update
      - name: Gerar IPA App Store
        script: |
          set -e
          echo "BUILD=flutter build ipa --release"
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
