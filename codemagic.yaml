workflows:
  default-workflow:
    name: ">>> USAR ESTE - iOS App Store <<<"
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DeficitApple
    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
        APP_STORE_APPLE_ID: "6772267019"
    scripts:
      - name: Criar Bundle ID e perfil App Store
        script: |
          set -e
          keychain initialize

          echo "=== Bundle ID $BUNDLE_ID ==="
          app-store-connect bundle-ids list --json > /tmp/bundle_ids.json || echo "[]" > /tmp/bundle_ids.json
          if ! grep -q "$BUNDLE_ID" /tmp/bundle_ids.json; then
            echo "Criando Bundle ID..."
            app-store-connect bundle-ids create \
              --identifier "$BUNDLE_ID" \
              --name "Deficit Calorico" \
              --platform IOS
          else
            echo "Bundle ID ja existe."
          fi

          echo "=== Sign in with Apple (app usa login Apple) ==="
          app-store-connect bundle-ids enable-capability \
            --bundle-id-identifier "$BUNDLE_ID" \
            --capability-type SIGN_IN_WITH_APPLE 2>/dev/null || echo "Capability OK ou ja ativa."

          echo "=== Certificado + perfil App Store ==="
          openssl genpkey -algorithm RSA -out /tmp/cm_dist.key -pkeyopt rsa_keygen_bits:2048

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --certificate-key @file:/tmp/cm_dist.key

          keychain add-certificates

          echo "=== Verificar perfil baixado ==="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          COUNT=$(find "$PROFILE_DIR" -name "*.mobileprovision" 2>/dev/null | wc -l | tr -d ' ')
          echo "Perfis em disco: $COUNT"
          if [ "$COUNT" = "0" ]; then
            echo "ERRO: fetch-signing-files nao baixou perfil. Confira API key DeficitApple (Admin/App Manager)."
            exit 1
          fi
          app-store-connect profiles list --json 2>/dev/null | grep -F "$BUNDLE_ID" || true
          echo "Assinatura OK."
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get
      - name: Icones do app
        script: |
          dart run flutter_launcher_icons
      - name: CocoaPods
        script: |
          set -e
          cd ios && pod install --repo-update
      - name: Aplicar perfil e gerar IPA
        script: |
          set -e
          keychain initialize
          keychain add-certificates

          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging

          echo "=== ExportOptions.plist ==="
          cat "$CM_BUILD_DIR/ios/ExportOptions.plist"

          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Version: $BUILD_NAME ($BUILD_NUMBER)"

          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$CM_BUILD_DIR/ios/ExportOptions.plist"

          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          test -n "$IPA"
          echo "IPA: $IPA"
      - name: ENVIAR para Apple
        script: |
          set -e
          IPA=$(find build/ios/ipa -name '*.ipa' | head -1)
          app-store-connect publish \
            --path "$IPA" \
            --apple-id "$APP_STORE_APPLE_ID" \
            --max-build-processing-wait 30
          echo "Upload OK."
    artifacts:
      - build/ios/ipa/*.ipa
