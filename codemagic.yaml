workflows:
  deficit-calorico-ios:
    name: Deficit Calorico iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: deficit_calorico
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: com.mycompany.deficitcalorico
    scripts:
      - name: Criar certificado e perfil App Store
        script: |
          app-store-connect certificates list --type IOS_DISTRIBUTION --save || \
          app-store-connect certificates create --type IOS_DISTRIBUTION --save
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Aplicar perfis no Xcode
        script: xcode-project use-profiles
      - name: Dependencias Flutter e CocoaPods
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Build IPA release
        script: |
          flutter build ipa --release \
            --build-name=1.0.2 \
            --build-number=116 \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
